  <!-- Bag handle -->
  <path d="M41 47 V40 a9 9 0 0 1 18 0 V47" fill="none" stroke="#ff3d0a" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Bag body -->
  <path d="M37 44 H63 a4 4 0 0 1 3.9 3.1 L72 74 a5 5 0 0 1 -4.9 6 H32.9 a5 5 0 0 1 -4.9 -6 L33.1 47.1 A4 4 0 0 1 37 44 Z" fill="#ff3d0a"/>
  <!-- Eyes -->
  <circle cx="43" cy="56" r="2.3" fill="#fff"/>
  <circle cx="57" cy="56" r="2.3" fill="#fff"/>
  <!-- Smile -->
  <path d="M43 63 Q50 71 57 63" fill="none" stroke="#fff" stroke-width="3.6" stroke-linecap="round"/>
</svg>
